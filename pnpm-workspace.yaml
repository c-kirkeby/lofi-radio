packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@fontsource-variable/inter": ^5.2.8
  "@internationalized/date": ^3.12.1
  "@lucide/svelte": ^1.8.0
  "@types/node": ^24
  bits-ui: ^2.17.3
  clsx: ^2.1.1
  lucide: ^1.8.0
  media-chrome: ^4.19.0
  mode-watcher: ^1.1.0
  shadcn-svelte: ^1.2.7
  tailwind-merge: ^3.5.0
  tailwind-variants: ^3.2.2
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
onlyBuiltDependencies:
  - "@tailwindcss/oxide"
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
